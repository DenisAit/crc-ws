services:
  # MariaDB (MySQL-kompatibel)
  db:
    image: mariadb:11
    container_name: lasanta-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: lasanta_db
      MARIADB_USER: lasanta
      MARIADB_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lasanta-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      DATABASE_URL: "mysql://lasanta:password@db:3306/lasanta_db"
      NODE_ENV: development
      HOST: "0.0.0.0"
      PORT: 3000
      JWT_SECRET: "your-super-secret-jwt-key-here-change-in-production"
      JWT_REFRESH_SECRET: "your-super-secret-refresh-key-here-change-in-production"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID}"
      DISCORD_REDIRECT_URI: "http://rdf-nc.de:3000/api/auth/discord/callback"
      FRONTEND_URL: "https://rdf-nc.de/"
      API_BASE_URL: "http://rdf-nc.de:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - api_uploads:/app/uploads  # Für persistente Uploads/Dateien
      - api_logs:/app/logs  # Für Log-Dateien

  # React Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: lasanta-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://rdf-nc.de:3000/api"
      NODE_ENV: development
      DOCKER: "true"
    depends_on:
      - api

volumes:
  mariadb_data:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local
