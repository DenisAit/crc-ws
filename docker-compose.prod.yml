services:
  # MariaDB (MySQL-kompatibel, vom Prisma-Schema vorausgesetzt)
  db:
    image: mariadb:11
    container_name: lasanta-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
      MARIADB_DATABASE: "${MARIADB_DATABASE:-lasanta_db}"
      MARIADB_USER: "${MARIADB_USER:-lasanta}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lasanta-network

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: lasanta-api
    restart: unless-stopped
    expose:
      - "3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL}"
      DISCORD_ABMELDUNG_WEBHOOK_URL: "${DISCORD_ABMELDUNG_WEBHOOK_URL}"
      DISCORD_PARTNER_WEBHOOK_URL: "${DISCORD_PARTNER_WEBHOOK_URL}"
      ADMIN_DISCORD_ID: "${ADMIN_DISCORD_ID}"
      FRONTEND_URL: "${FRONTEND_URL}"
      API_BASE_URL: "${API_BASE_URL}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - lasanta-network

  # React Frontend (internal Nginx auf Port 80)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: lasanta-web
    restart: unless-stopped
    expose:
      - "80"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - lasanta-network

  # Reverse Proxy (TLS-Terminierung mit Let's Encrypt)
  nginx:
    image: nginx:alpine
    container_name: lasanta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    # Nginx alle 6h reloaden, damit erneuerte Zertifikate aktiv werden
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!};
      nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      - api
      - web
    networks:
      - lasanta-network

  # Let's Encrypt Auto-Renewal (alle 12h)
  certbot:
    image: certbot/certbot
    container_name: lasanta-certbot
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"

volumes:
  mariadb_data:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_etc:
    driver: local
  certbot_www:
    driver: local

networks:
  lasanta-network:
    driver: bridge
